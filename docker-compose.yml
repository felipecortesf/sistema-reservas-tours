    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reportes_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_PASSWORD: root123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka:8761/eureka/

  ms-whatsapp:
    build: ./ms-whatsapp
    container_name: ms-whatsapp
