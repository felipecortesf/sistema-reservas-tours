spring.application.name=ms-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.mvc.routes[0].id=ms-usuarios
spring.cloud.gateway.mvc.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/usuarios/**

spring.cloud.gateway.mvc.routes[1].id=ms-catalogo-tours
spring.cloud.gateway.mvc.routes[1].uri=lb://ms-catalogo-tours
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/v1/tours/**

